<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <!-- Background -->
  <rect width="800" height="1000" fill="#f8f9fa"/>
  
  <!-- Border -->
  <rect x="20" y="20" width="760" height="960" fill="white" stroke="#ddd" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="760" height="120" fill="#0b5394" stroke="#ddd" stroke-width="2"/>
  <text x="400" y="70" font-size="48" font-weight="bold" text-anchor="middle" fill="white">PAYMENT SLIP</text>
  <text x="400" y="110" font-size="18" text-anchor="middle" fill="#e8f0fe">BoardingBook Payment Receipt</text>
  
  <!-- Slip ID Section -->
  <text x="40" y="160" font-size="14" font-weight="bold" fill="#0b5394">SLIP ID:</text>
  <rect x="400" y="145" width="360" height="30" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <text x="410" y="167" font-size="13" fill="#333" font-family="monospace" id="slipId">SLP-2026-00001</text>
  
  <!-- Tenant Information Section -->
  <text x="40" y="240" font-size="16" font-weight="bold" fill="#0b5394">TENANT INFORMATION</text>
  <line x1="40" y1="250" x2="760" y2="250" stroke="#ddd" stroke-width="1"/>
  
  <text x="40" y="285" font-size="12" fill="#666">Tenant Name:</text>
  <rect x="200" y="270" width="520" height="28" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="210" y="292" font-size="14" fill="#000" font-weight="600" id="tenantName">John Doe</text>
  
  <text x="40" y="340" font-size="12" fill="#666">Room Number:</text>
  <rect x="200" y="325" width="250" height="28" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="210" y="347" font-size="14" fill="#000" font-weight="600" id="roomNumber">Room 101</text>
  
  <text x="470" y="340" font-size="12" fill="#666">Boarding House:</text>
  <rect x="630" y="325" width="130" height="28" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="640" y="347" font-size="12" fill="#000" id="placeName">Main House</text>
  
  <!-- Payment Information Section -->
  <text x="40" y="420" font-size="16" font-weight="bold" fill="#0b5394">PAYMENT DETAILS</text>
  <line x1="40" y1="430" x2="760" y2="430" stroke="#ddd" stroke-width="1"/>
  
  <!-- Payment Amount Box (Highlighted) -->
  <rect x="40" y="460" width="560" height="100" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="4"/>
  <text x="60" y="490" font-size="13" fill="#2e7d32">Amount Paid:</text>
  <text x="60" y="535" font-size="56" font-weight="bold" fill="#1b5e20" id="paymentAmount">Rs. 25,000</text>
  
  <rect x="620" y="460" width="140" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="4"/>
  <text x="635" y="490" font-size="12" fill="#e65100">Payment Status:</text>
  <text x="635" y="535" font-size="18" font-weight="bold" fill="#e65100" id="paymentStatus">PENDING</text>
  
  <!-- Date Section -->
  <text x="40" y="610" font-size="12" fill="#666">Payment Date:</text>
  <rect x="200" y="595" width="250" height="28" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="210" y="617" font-size="14" fill="#000" id="paymentDate">2026-04-06</text>
  
  <text x="470" y="610" font-size="12" fill="#666">Due Date:</text>
  <rect x="630" y="595" width="130" height="28" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="640" y="617" font-size="12" fill="#d32f2f" id="dueDate">2026-05-06</text>
  
  <!-- Remarks Section -->
  <text x="40" y="680" font-size="12" fill="#666">Remarks/Note:</text>
  <rect x="40" y="690" width="720" height="70" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="715" font-size="12" fill="#666" id="remarks">Monthly rent payment for the month of April 2026</text>
  
  <!-- Footer -->
  <line x1="40" y1="800" x2="760" y2="800" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="850" font-size="11" text-anchor="middle" fill="#999">This is an official payment slip. Please keep it for your records.</text>
  <text x="400" y="875" font-size="11" text-anchor="middle" fill="#999">© 2026 BoardingBook - Student Housing Management System</text>
  
  <!-- Generated Info -->
  <text x="40" y="930" font-size="10" fill="#999">Generated:</text>
  <text x="150" y="930" font-size="10" fill="#666" id="generatedDate">2026-04-06 10:30 AM</text>
  
  <text x="40" y="955" font-size="10" fill="#999">Document ID:</text>
  <text x="150" y="955" font-size="10" fill="#666" font-family="monospace">DOC-2026-BB-001</text>
  
  <!-- Security pattern border -->
  <defs>
    <pattern id="diagonal" patternUnits="userSpaceOnUse" width="8" height="8">
      <line x1="0" y1="0" x2="8" y2="8" stroke="#f5f5f5" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="20" y="20" width="760" height="960" fill="url(#diagonal)" stroke-width="0"/>
</svg>